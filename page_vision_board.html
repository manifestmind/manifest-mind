<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManifestMind — Vision Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@keyframes breatheEye{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.93)}}
@keyframes fadeUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes softPulse{0%,100%{opacity:.22;transform:scale(1)}50%{opacity:.35;transform:scale(1.04)}}

*{margin:0;padding:0;box-sizing:border-box}
body{background:#1A1020;font-family:'Jost',sans-serif;padding:32px 20px 48px;display:flex;flex-direction:column;align-items:center;gap:20px}
.section-title{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.2em;text-transform:uppercase;text-align:center}
.col{display:flex;flex-direction:column;align-items:center;gap:10px}
.lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.phone{
  width:260px;height:530px;background:#F0EAE0;border-radius:38px;
  border:0.5px solid #D4C4B8;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
  box-shadow:0 32px 64px rgba(0,0,0,.5);
}
.orb{position:absolute;border-radius:50%;animation:softPulse 6s ease-in-out infinite;pointer-events:none}
.navbar{
  height:50px;background:#F0EAE0;border-top:0.5px solid #D4C4B8;
  display:flex;align-items:center;justify-content:space-around;
  padding:0 6px 2px;flex-shrink:0;z-index:2;
}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.nl{font-size:8px;font-weight:300;color:#A09088}
.nd{width:3px;height:3px;border-radius:50%;background:#6B3FA0}

.cell{
  border-radius:10px;padding:8px;
  display:flex;flex-direction:column;
  justify-content:space-between;
}
.add-btn{
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px dashed currentColor;flex-shrink:0;
}
.skip{
  text-align:center;font-size:10px;color:#A09088;
  text-decoration:underline;cursor:pointer;margin-top:5px;
}
.cta-btn{
  width:100%;padding:9px;border-radius:50px;border:none;
  background:#3A3530;color:#F0EAE0;
  font-size:10px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:6px;
}
</style>
</head>
<body>

<p class="section-title">ManifestMind — Vision Board</p>

<div class="col">
  <p class="lbl">08 — Vision Board</p>
  <div class="phone">
    <div class="orb" style="width:140px;height:140px;background:#C4A8D4;top:-35px;right:-35px"></div>
    <div class="orb" style="width:85px;height:85px;background:#B8D4B0;bottom:55px;left:-22px;animation-delay:1s"></div>

    <div style="flex:1;display:flex;flex-direction:column;padding:16px 14px 8px;gap:8px;z-index:1;overflow:hidden">

      <!-- Œil + titre + badge -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;animation:fadeUp .5s ease .1s both;flex-shrink:0">
        <svg width="48" height="37" viewBox="0 0 56 44" style="overflow:visible">
          <clipPath id="vbc1"><path d="M8 22 Q28 6 48 22 Q28 38 8 22Z"/></clipPath>
          <path d="M8 22 Q28 6 48 22 Q28 38 8 22Z" fill="#FAF6F0"/>
          <circle cx="28" cy="22" r="10.5" fill="#DDD0F8" clip-path="url(#vbc1)" style="transform-origin:28px 22px;animation:breatheEye 4s ease-in-out infinite"/>
          <circle cx="28" cy="22" r="8" fill="#9B72C8" opacity=".75" clip-path="url(#vbc1)"/>
          <circle cx="28" cy="22" r="5.8" fill="#6B3FA0" opacity=".9" clip-path="url(#vbc1)"/>
          <circle cx="28" cy="22" r="3" fill="#1A0E30" clip-path="url(#vbc1)"/>
          <circle cx="30.5" cy="19.5" r="1.3" fill="white" opacity=".9" clip-path="url(#vbc1)"/>
          <circle cx="28" cy="15.5" r="1.8" fill="#EAC870" clip-path="url(#vbc1)"/>
          <circle cx="28" cy="15.5" r=".8" fill="#C89A30" clip-path="url(#vbc1)"/>
          <path d="M8 22 Q28 6 48 22" fill="none" stroke="#3A2850" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M8 22 Q28 38 48 22" fill="none" stroke="#3A2850" stroke-width=".9" stroke-linecap="round" opacity=".5"/>
          <circle cx="8" cy="22" r="1" fill="#C4A8D4" opacity=".6"/>
          <circle cx="48" cy="22" r="1" fill="#C4A8D4" opacity=".6"/>
        </svg>
        <div style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:2px">
          <p style="font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:#2A2520">Vision Board</p>
          <span style="font-size:10px;background:#FDE8B0;color:#9A6A00;padding:2px 8px;border-radius:20px;font-weight:500">+5 pts/cycle</span>
        </div>
        <div style="width:100%;height:1px;background:#E0D8D0;margin-top:2px"></div>
      </div>

      <!-- Grille 7 cases -->
      <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr 1.2fr;gap:5px;animation:fadeUp .5s ease .2s both">

        <!-- Carrière -->
        <div class="cell" style="background:#DDD0F8;border:0.5px solid #C4A8D4">
          <div style="display:flex;justify-content:space-between">
            <svg width="13" height="13" viewBox="0 0 20 20" fill="none"><rect x="2" y="6" width="16" height="11" rx="2" stroke="#6B3FA0" stroke-width="1.2" fill="none"/><path d="M7 6V5a3 3 0 016 0v1" stroke="#6B3FA0" stroke-width="1.2" stroke-linecap="round"/></svg>
            <div class="add-btn" style="color:#9B72C8">
              <svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#6B3FA0" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
          </div>
          <div>
            <p style="font-size:9px;font-weight:500;color:#4A2080">Carrière</p>
            <p style="font-size:7px;color:#8B70B8">+ photo</p>
          </div>
        </div>

        <!-- Amour -->
        <div class="cell" style="background:#F8D0D8;border:0.5px solid #E8A8B8">
          <div style="display:flex;justify-content:space-between">
            <svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M10 16S2 11 2 6a4 4 0 018-1.5A4 4 0 0118 6c0 5-8 10-8 10z" fill="#C84860" opacity=".7"/></svg>
            <div class="add-btn" style="color:#C84860">
              <svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#C84860" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
          </div>
          <div>
            <p style="font-size:9px;font-weight:500;color:#8A2840">Amour</p>
            <p style="font-size:7px;color:#C08090">+ photo</p>
          </div>
        </div>

        <!-- Abondance -->
        <div class="cell" style="background:#FDE8B0;border:0.5px solid #E8C860">
          <div style="display:flex;justify-content:space-between">
            <svg width="13" height="13" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="#9A6A00" stroke-width="1.2" fill="none"/><path d="M10 5v1.5M10 13V14M8 8C8 7.2 8.9 6.5 10 6.5S12 7.2 12 8s-1.1 1.5-2 1.5-2 .8-2 1.5.9 1.5 2 1.5 2-.7 2-1.5" stroke="#9A6A00" stroke-width=".9" stroke-linecap="round"/></svg>
            <div class="add-btn" style="color:#C89A10">
              <svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#9A6A00" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
          </div>
          <div>
            <p style="font-size:9px;font-weight:500;color:#7A5000">Abondance</p>
            <p style="font-size:7px;color:#B09050">+ photo</p>
          </div>
        </div>

        <!-- Rêves -->
        <div class="cell" style="background:#C4E8F0;border:0.5px solid #90C8D8">
          <div style="display:flex;justify-content:space-between">
            <svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M4 10a6 6 0 0112 0" stroke="#1A6A80" stroke-width="1.2" fill="none"/><circle cx="10" cy="13" r="1.5" fill="#1A6A80" opacity=".6"/></svg>
            <div class="add-btn" style="color:#1A6A80">
              <svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#1A6A80" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
          </div>
          <div>
            <p style="font-size:9px;font-weight:500;color:#0A4858">Rêves</p>
            <p style="font-size:7px;color:#508090">+ photo</p>
          </div>
        </div>

        <!-- Voyages -->
        <div class="cell" style="background:#C8E8C0;border:0.5px solid #A0C890">
          <div style="display:flex;justify-content:space-between">
            <svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2z" stroke="#2A6A20" stroke-width="1.2" fill="none"/><path d="M2 10h16M10 2c-2 3-3 5-3 8s1 5 3 8" stroke="#2A6A20" stroke-width="1" fill="none"/></svg>
            <div class="add-btn" style="color:#2A6A20">
              <svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#2A6A20" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
          </div>
          <div>
            <p style="font-size:9px;font-weight:500;color:#1A4A18">Voyages</p>
            <p style="font-size:7px;color:#4A8A40">+ photo</p>
          </div>
        </div>

        <!-- Santé -->
        <div class="cell" style="background:#FFE4C8;border:0.5px solid #F0C090">
          <div style="display:flex;justify-content:space-between">
            <svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M10 3v14M3 10h14" stroke="#C06820" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="10" r="7" stroke="#C06820" stroke-width="1" fill="none" opacity=".4"/></svg>
            <div class="add-btn" style="color:#C06820">
              <svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#C06820" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
          </div>
          <div>
            <p style="font-size:9px;font-weight:500;color:#904810">Santé</p>
            <p style="font-size:7px;color:#C08858">+ photo</p>
          </div>
        </div>

        <!-- Famille — pleine largeur -->
        <div class="cell" style="grid-column:1/3;background:#E8F0D8;border:0.5px solid #C0D8A0;flex-direction:row;align-items:center;gap:10px;padding:8px 12px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="3" stroke="#3A6A10" stroke-width="1.2" fill="none"/><circle cx="17" cy="8" r="2.5" stroke="#3A6A10" stroke-width="1.2" fill="none"/><path d="M2 19c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="#3A6A10" stroke-width="1.2" stroke-linecap="round" fill="none"/><path d="M16 14c2 0 4 1.3 4 3.5" stroke="#3A6A10" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>
          <div style="flex:1">
            <p style="font-size:9px;font-weight:500;color:#2A5008">Famille &amp; Proches</p>
            <p style="font-size:7px;color:#6A9040">Appuie pour ajouter ta photo</p>
          </div>
          <div style="width:28px;height:28px;border-radius:8px;background:#C0D8A0;display:flex;align-items:center;justify-content:center;border:1px dashed #8AAA60">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="#4A8A20" stroke-width="1.4" stroke-linecap="round"/></svg>
          </div>
        </div>

      </div>

      <!-- Texte bas + bouton fin de cycle -->
      <div style="flex-shrink:0">
        <p style="font-size:9px;color:#A09088;text-align:center;margin-bottom:6px">Appuie sur une case pour ajouter ta photo</p>
        <button class="cta-btn">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Terminer mon cycle ✦
        </button>
      </div>

    </div>

    <!-- Navbar 3 onglets — aucun actif, tous cliquables -->
    <div class="navbar">
      <div class="ni">
        <svg width="17" height="17" viewBox="0 0 22 22" fill="none"><path d="M3 9.5L11 3l8 6.5V19a1 1 0 01-1 1H14v-5h-4v5H4a1 1 0 01-1-1V9.5z" fill="#A09088"/></svg>
        <span class="nl">Accueil</span>
      </div>
      <div class="ni">
        <svg width="17" height="17" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="4" stroke="#A09088" stroke-width="1.2" fill="none"/><path d="M3 19c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke="#A09088" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>
        <span class="nl">Profil</span>
      </div>
      <div class="ni">
        <svg width="17" height="17" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke="#A09088" stroke-width="1.2" fill="none"/><path d="M11 2v2M11 18v2M2 11h2M18 11h2M4.9 4.9l1.4 1.4M15.7 15.7l1.4 1.4M4.9 17.1l1.4-1.4M15.7 6.3l1.4-1.4" stroke="#A09088" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span class="nl">Paramètres</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
